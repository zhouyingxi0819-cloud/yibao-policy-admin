<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医保报销政策列表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    color: #303133;
    font-size: 14px;
    line-height: 1.5;
    padding: 16px;
  }

  .card {
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
    margin-bottom: 16px;
  }

  /* ===== 筛选区 ===== */
  .filter-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 18px 24px;
    padding: 18px 20px;
  }
  .filter-item { display: flex; align-items: center; gap: 8px; }
  .filter-item label { color: #606266; white-space: nowrap; }
  .filter-item select {
    border: 1px solid #dcdfe6;
    border-radius: 4px;
    padding: 7px 12px;
    font-size: 14px;
    color: #303133;
    outline: none;
    min-width: 150px;
    background: #fff;
  }
  .filter-item select:focus { border-color: #409eff; }
  .filter-actions { display: flex; gap: 10px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #fff;
    white-space: nowrap;
  }
  .btn-search { background: #2ba471; }
  .btn-search:hover { background: #259568; }
  .btn-reset { background: #e6a23c; }
  .btn-reset:hover { background: #d8941f; }
  .btn-add { background: #4087f0; }
  .btn-add:hover { background: #2f74dc; }
  .btn-export { background: #2ba471; }
  .btn-export:hover { background: #259568; }

  /* ===== 工具栏 ===== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 0;
  }
  .toolbar-left { display: flex; gap: 10px; }
  .toolbar-right { display: flex; gap: 12px; color: #909399; }
  .toolbar-right .ico {
    cursor: pointer; font-size: 16px;
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid #dcdfe6; border-radius: 4px;
  }
  .toolbar-right .ico:hover { color: #409eff; border-color: #c6e2ff; }

  /* ===== 表格 ===== */
  .table-wrap { padding: 16px 20px 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #f5f7fa;
    color: #303133;
    font-weight: 600;
    text-align: left;
    padding: 12px 14px;
    border-bottom: 1px solid #ebeef5;
    white-space: nowrap;
  }
  thead th.center, tbody td.center { text-align: center; }
  tbody td {
    padding: 13px 14px;
    border-bottom: 1px solid #f0f2f5;
    color: #606266;
  }
  tbody tr:hover { background: #f9fbff; }

  .link {
    color: #409eff;
    cursor: pointer;
    font-weight: 500;
  }
  .link:hover { text-decoration: underline; }

  .city-cell { color: #303133; }
  .prov-cell { color: #303133; }

  /* 状态徽标 */
  .status {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    color: #fff;
  }
  .status.on { background: #2ba471; }
  .status.off { background: #c0c4cc; }

  /* 配置状态徽标 */
  .cfg {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .cfg.done { color: #2ba471; background: #e7f6ef; border-color: #b7e4ce; }
  .cfg.undone { color: #909399; background: #f4f4f5; border-color: #e4e7ed; }

  /* 操作按钮 */
  .op-btn {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 5px 10px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: #fff;
    margin-right: 6px;
  }
  .op-edit { background: #4087f0; }
  .op-edit:hover { background: #2f74dc; }
  .op-toggle { background: #e6a23c; }
  .op-toggle:hover { background: #d8941f; }
  .op-del { background: #f05a5a; }
  .op-del:hover { background: #e23b3b; }

  /* 底部统计 */
  .table-foot {
    padding: 14px 20px 18px;
    color: #909399;
    font-size: 13px;
  }
</style>
</head>
<body>

  <!-- 筛选区 -->
  <div class="card">
    <div class="filter-bar">
      <div class="filter-item">
        <label>适用省份：</label>
        <select id="fProvince">
          <option value="">所有省份</option>
        </select>
      </div>
      <div class="filter-item">
        <label>适用城市：</label>
        <select id="fCity">
          <option value="">所有城市</option>
        </select>
      </div>
      <div class="filter-item">
        <label>状态：</label>
        <select id="fStatus">
          <option value="">所有</option>
          <option value="on">已发布</option>
          <option value="off">已停用</option>
        </select>
      </div>
      <div class="filter-item">
        <label>医疗救助：</label>
        <select id="fMedical">
          <option value="">全部</option>
          <option value="1">已配置</option>
          <option value="0">未配置</option>
        </select>
      </div>
      <div class="filter-item">
        <label>基本医疗&大病医疗：</label>
        <select id="fBasic">
          <option value="">全部</option>
          <option value="1">已配置</option>
          <option value="0">未配置</option>
        </select>
      </div>
      <div class="filter-item">
        <label>商业健康险：</label>
        <select id="fCommercial">
          <option value="">全部</option>
          <option value="1">已配置</option>
          <option value="0">未配置</option>
        </select>
      </div>
      <div class="filter-actions">
        <button class="btn btn-search" onclick="doSearch()">搜索</button>
        <button class="btn btn-reset" onclick="doReset()">重置</button>
      </div>
    </div>
  </div>

  <!-- 列表区 -->
  <div class="card">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-add" onclick="goEdit()">+ 新增</button>
        <button class="btn btn-export" onclick="doExport()">导出</button>
      </div>
      <div class="toolbar-right">
        <span class="ico" title="刷新" onclick="renderTable()">⟳</span>
        <span class="ico" title="列设置">☰</span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>关联省份</th>
            <th>关联城市</th>
            <th class="center">医疗救助</th>
            <th class="center">基本医疗&大病医疗</th>
            <th class="center">商业健康险</th>
            <th class="center">状态</th>
            <th>最近一次修改时间</th>
            <th class="center" style="width:230px;">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="table-foot" id="foot"></div>
  </div>

<script>
/* ===== 省份 / 城市基础数据（用于筛选下拉联动） ===== */
const PROVINCES = [
  { name: "北京市", cities: ["北京市"] },
  { name: "天津市", cities: ["天津市"] },
  { name: "河北省", cities: ["石家庄市","唐山市","秦皇岛市","邯郸市","邢台市","保定市","张家口市","承德市","沧州市","廊坊市","衡水市"] },
  { name: "上海市", cities: ["上海市"] },
  { name: "浙江省", cities: ["杭州市","宁波市","温州市","嘉兴市","湖州市","绍兴市"] },
  { name: "广东省", cities: ["广州市","深圳市","珠海市","汕头市","佛山市"] }
];

/* ===== 列表数据（示例） =====
   medical  ：医疗救助          配置状态  1=已配置 0=未配置
   basic    ：基本医疗&大病医疗 配置状态
   commercial：商业健康险        配置状态 */
const DATA = [
  { provinces: ["北京市"], cities: ["北京市"], status: "on", medical: 1, basic: 1, commercial: 1, updateTime: "2026-06-29 11:16:31" },
  { provinces: ["河北省","北京市","天津市"], cities: ["保定市","北京市","唐山市","天津市"], status: "on", medical: 1, basic: 1, commercial: 0, updateTime: "2026-05-20 09:56:41" },
  { provinces: ["北京市"], cities: ["北京市"], status: "on", medical: 1, basic: 0, commercial: 0, updateTime: "2026-06-29 11:05:41" },
  { provinces: ["北京市"], cities: ["北京市"], status: "on", medical: 0, basic: 1, commercial: 1, updateTime: "2026-06-29 11:15:41" },
  { provinces: ["河北省","北京市","天津市"], cities: ["保定市","北京市","唐山市","天津市"], status: "on", medical: 1, basic: 1, commercial: 1, updateTime: "2026-05-15 15:29:03" },
  { provinces: ["北京市"], cities: ["北京市"], status: "off", medical: 0, basic: 0, commercial: 0, updateTime: "2026-05-15 15:29:14" },
  { provinces: ["北京市"], cities: ["北京市"], status: "on", medical: 1, basic: 0, commercial: 1, updateTime: "2026-06-29 11:03:32" },
  { provinces: ["浙江省"], cities: ["杭州市"], status: "on", medical: 0, basic: 1, commercial: 0, updateTime: "2026-06-30 11:38:09" }
];

/* ===== 初始化筛选下拉 ===== */
function initFilters() {
  const provSel = document.getElementById('fProvince');
  PROVINCES.forEach(p => {
    const o = document.createElement('option');
    o.value = p.name; o.textContent = p.name;
    provSel.appendChild(o);
  });
  // 省份变化时联动城市
  provSel.addEventListener('change', () => {
    const citySel = document.getElementById('fCity');
    citySel.innerHTML = '<option value="">所有城市</option>';
    const prov = PROVINCES.find(p => p.name === provSel.value);
    if (prov) {
      prov.cities.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        citySel.appendChild(o);
      });
    } else {
      // 未选省份则列出全部城市
      PROVINCES.forEach(p => p.cities.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        citySel.appendChild(o);
      }));
    }
  });
  provSel.dispatchEvent(new Event('change'));
}

/* ===== 渲染表格 ===== */
function ellipsis(arr, max = 3) {
  if (arr.length <= max) return arr.join("、");
  return arr.slice(0, max).join("、") + "、…";
}

/* 配置状态徽标：1=已配置 0=未配置 */
function cfgBadge(v) {
  return v
    ? '<span class="cfg done">已配置</span>'
    : '<span class="cfg undone">未配置</span>';
}

function renderTable() {
  const prov = document.getElementById('fProvince').value;
  const city = document.getElementById('fCity').value;
  const status = document.getElementById('fStatus').value;
  const medical = document.getElementById('fMedical').value;
  const basic = document.getElementById('fBasic').value;
  const commercial = document.getElementById('fCommercial').value;

  const rows = DATA.filter(d =>
    (!prov || d.provinces.includes(prov)) &&
    (!city || d.cities.includes(city)) &&
    (!status || d.status === status) &&
    (medical === "" || String(d.medical) === medical) &&
    (basic === "" || String(d.basic) === basic) &&
    (commercial === "" || String(d.commercial) === commercial)
  );

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = "";
  rows.forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="prov-cell">${ellipsis(d.provinces)}</td>
      <td class="city-cell">${ellipsis(d.cities)}</td>
      <td class="center">${cfgBadge(d.medical)}</td>
      <td class="center">${cfgBadge(d.basic)}</td>
      <td class="center">${cfgBadge(d.commercial)}</td>
      <td class="center">
        <span class="status ${d.status === 'on' ? 'on' : 'off'}">${d.status === 'on' ? '已发布' : '已停用'}</span>
      </td>
      <td>${d.updateTime}</td>
      <td class="center">
        <button class="op-btn op-edit" onclick="goEdit()">编辑</button>
        <button class="op-btn op-toggle">${d.status === 'on' ? '下架' : '上架'}</button>
        <button class="op-btn op-del">删除</button>
      </td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('foot').textContent =
    `显示第 1 到第 ${rows.length} 条记录，总共 ${rows.length} 条记录`;
}

/* ===== 操作 ===== */
function doSearch() { renderTable(); }
function doReset() {
  document.getElementById('fProvince').value = "";
  document.getElementById('fProvince').dispatchEvent(new Event('change'));
  document.getElementById('fStatus').value = "";
  document.getElementById('fMedical').value = "";
  document.getElementById('fBasic').value = "";
  document.getElementById('fCommercial').value = "";
  renderTable();
}
function doExport() { alert("导出当前筛选结果（示例）"); }

/* 新增 / 编辑 → 跳转政策详情配置页 */
function goEdit() {
  window.location.href = "edit.html";
}

/* ===== 启动 ===== */
initFilters();
renderTable();
</script>
</body>
</html>
